name: Install

on:
  workflow_call:

jobs:
  install:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v7.0.0

    - uses: actions/setup-node@v6.4.0
      with:
        node-version: 24.16.0

    - name: Restore Cache
      id: restore-cache
      uses: actions/cache/restore@v5.0.5
      with:
        path: |
          common/temp
          */.rush/temp
          */node_modules
        key: ${{ runner.os }}-${{ hashFiles('common/config/rush/repo-state.json', 'common/config/rush/pnpm-config.json', 'rush.json', '.github/workflows/ci-salt.txt') }}
        # Only need a cache hit or miss,
        # cached dependencies aren't used until following jobs
        lookup-only: true

    - name: Install
      if: steps.restore-cache.outputs.cache-hit != 'true'
      run: node common/scripts/install-run-rush.js install
      env:
        # Only install Cypress binary when needed in e2e-test.yml
        CYPRESS_INSTALL_BINARY: 0

    - name: Save Cache
      id: save-cache
      uses: actions/cache/save@v5.0.5
      if: steps.restore-cache.outputs.cache-hit != 'true'
      with:
        path: |
          common/temp
          */.rush/temp
          */node_modules
        key: ${{ steps.restore-cache.outputs.cache-primary-key }}
